<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link rel="stylesheet" href="/styles/profile.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geologica:wght@496&display=swap"
      rel="stylesheet"
    />
    <style>
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.5);
      }
      .modal.hidden {
        display: none;
      }
      .modal-content {
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        min-width: 300px;
        text-align: center;
        position: relative;
      }
      #close-modal {
        position: absolute;
        top: 10px;
        right: 15px;
        cursor: pointer;
        font-size: 20px;
      }
    </style>
  </head>
  <body>
    <p>
      <a href="http://localhost:8080/feed">
        <img
          src="/uploads/imgSite/W Font Letter-fotor-bg-remover-20250915145631.png"
          alt="Whitty"
          class="logo"
        />
      </a>
    </p>

    <div class="profile-container">
      <h1>Your Profile</h1>
      <p>Welcome, <span id="username"></span></p>
      <button id="logout-button">Logout</button>
      <button id="chat-button">
        <div class="svg-wrapper-1">
          <div class="svg-wrapper">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              width="24"
              height="24"
            >
              <path fill="none" d="M0 0h24v24H0z"></path>
              <path
                fill="currentColor"
                d="M1.946 9.315c-.522-.174-.527-.455.01-.634l19.087-6.362c.529-.176.832.12.684.638l-5.454 19.086c-.15.529-.455.547-.679.045L12 14l6-8-8 6-8.054-2.685z"
              ></path>
            </svg>
          </div>
        </div>
        <span>Chat</span>
      </button>
      <button type="button" id="feed-button">News Feed 📰</button>

      <img
        id="profile-pic"
        src="/uploads/imgSite/default.jpg"
        alt="Profile Picture"
        width="300"
      />

      <button id="set-avatar-btn">Set avatar</button>
    </div>

    <div id="avatar-modal" class="modal hidden">
      <div class="modal-content">
        <span id="close-modal">&times;</span>
        <h3>Upload new avatar</h3>
        <form id="avatarForm" enctype="multipart/form-data">
          <input type="file" name="avatar" accept="image/*" required />
          <button type="submit">Загрузить</button>
        </form>
      </div>
    </div>
    <div
      class="country-section"
      style="
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
      "
    >
      <h3>🌍 Your Region</h3>

      <p>
        Current country:
        <strong id="current-country-display">Not selected</strong>
      </p>

      <label for="countrySelect">Change country:</label>
      <select id="countrySelect" style="padding: 5px; margin-right: 10px">
        <option value="">Loading...</option>
      </select>

      <button id="saveCountryBtn" style="padding: 5px 10px; cursor: pointer">
        Save
      </button>
    </div>

    <button
      id="openPostModalBtn"
      style="margin-top: 20px; padding: 10px 20px; cursor: pointer"
    >
      ➕ Create New Post
    </button>

    <div id="postModal" class="modal-overlay">
      <div class="modal-content">
        <span class="close-btn" id="closePostModalBtn">&times;</span>
        <h2>Create a Post</h2>

        <form id="createPostForm" action="">
          <textarea
            id="postContent"
            name="content"
            placeholder="What's on your mind?"
            rows="4"
          ></textarea>
          <div class="file-input-wrapper">
            <label for="postImage">Attach Image:</label>
            <input type="file" id="postImage" name="image" accept="image/*" />
          </div>

          <button type="submit" class="submit-btn">Publish Post</button>
        </form>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="js/post.js"></script>
    <script src="js/coutry.load.js"></script>
    <script src="js/avatar.load.js"></script>
  </body>
</html>
